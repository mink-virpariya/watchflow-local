rules:
  - id: file-upload-approval
    name: File Upload Approval Requied
    description: Any file upload must need approval from maintainer unless the author is a maintainer
    enabled: true
    severity: high
    event_types: [push]
    parameters:
      file_patterns: ["*.py*"]

  - id: pr-approval-required
    name: PR Approval Required
    description: All pull requests must have a min num of approvals unless the author is a maintainer
    enabled: true
    severity: high
    event_types: [pull_request]
    parameters:
      min_approvals: 2

  - id: no-deploy-wednesday
    name: No Wednesday Deployments
    description: Prevent deployments on Wednesday
    enabled: true
    severity: medium
    event_types: [deployment]
    parameters:
      restricted_days: [Wednesday]
